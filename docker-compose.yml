version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: zentria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-zentria}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zentria_dev}
      POSTGRES_DB: ${DB_NAME:-zentria_tracking}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zentria} -d ${DB_NAME:-zentria_tracking}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default
      - zentria-net

  redis:
    image: redis:7-alpine
    container_name: zentria-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zentria-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-zentria}
      DB_PASSWORD: ${DB_PASSWORD:-zentria_dev}
      DB_NAME: ${DB_NAME:-zentria_tracking}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_KEY: ${API_KEY:-dev_key_change_in_production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:

networks:
  default: {}
  zentria-net:
    external: true
